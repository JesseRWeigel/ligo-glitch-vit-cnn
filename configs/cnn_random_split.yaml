# CNN Random-Split Ablation Configuration
# IDENTICAL to cnn_baseline.yaml EXCEPT:
#   - data manifests point to random-split versions
#   - output_dir / checkpoint_dir point to Phase 6 locations
#
# Purpose: Isolate the effect of temporal vs random split on accuracy.
# The ONLY variable is the split method; all hyperparameters are frozen.

model:
  architecture: resnetv2_50x1_bit
  pretrained: imagenet21k_ft_in1k
  num_classes: 23

data:
  train_manifest: data/metadata/random_split_train_manifest.csv
  val_manifest: data/metadata/random_split_val_manifest.csv
  test_manifest: data/metadata/random_split_test_manifest.csv
  image_root: "."
  duration: "1.0s"
  image_size: 224
  num_workers: 4
  pin_memory: true

training:
  optimizer: AdamW
  learning_rate: 1.0e-3   # CNN rate; ViT uses 1e-4 (standard transfer learning practice)
  weight_decay: 0.01
  batch_size: 64
  epochs: 100
  warmup_epochs: 5
  scheduler: cosine
  gradient_clip_max_norm: 1.0
  mixed_precision: fp16
  early_stopping_patience: 10
  early_stopping_metric: val_macro_f1
  label_smoothing: 0.1

loss:
  type: focal
  gamma: 2.0
  alpha: sqrt_inverse  # Computed from training set class counts

sampling:
  strategy: weighted_random
  weights: sqrt_inverse
  replacement: true

evaluation:
  bootstrap_resamples: 10000
  confidence_level: 0.95
  rare_threshold_train: 200  # Classes with < 200 train samples

seed: 42
output_dir: results/06-computation-statistical-analysis/random-split-cnn
checkpoint_dir: checkpoints/06-random-split-cnn
